services:
  ollama:
    image: ollama/ollama:latest
    container_name: jfile-ollama
    restart: unless-stopped
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - internal
    # Para usar GPU NVIDIA, descomente as linhas abaixo:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  backend:
    build: ./backend
    container_name: jfile-backend
    restart: unless-stopped
    volumes:
      - uploads_data:/srv/app/uploads
      - covers_data:/srv/app/covers
      - pages_data:/srv/app/pages
      - db_data:/srv/app/data
    env_file:
      - .env
    depends_on:
      - ollama
    networks:
      - internal

  frontend:
    build: ./frontend
    container_name: jfile-frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - internal
      - jv-web

networks:
  internal:
    driver: bridge
  jv-web:
    external: true
    name: jv-web

volumes:
  ollama_data:
  uploads_data:
  covers_data:
  pages_data:
  db_data:
